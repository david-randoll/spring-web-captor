services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "11006:11006"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:11006}
    ports:
      - "11007:11007"
    depends_on:
      - backend
